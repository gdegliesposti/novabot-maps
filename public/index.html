<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Path Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0f12;
      --surface:  #141720;
      --border:   #252a35;
      --accent:   #00e5ff;
      --accent2:  #ff6b35;
      --dim:      #4a5568;
      --text:     #c8d0e0;
      --text-hi:  #eef2ff;
      --radius:   6px;
      --mono:     'JetBrains Mono', monospace;
      --display:  'Syne', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* TOP BAR */
    header {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 0 20px;
      height: 48px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .logo {
      font-family: var(--display);
      font-weight: 800;
      font-size: 15px;
      color: var(--text-hi);
      letter-spacing: -0.5px;
    }
    .logo span { color: var(--accent); }

    .toolbar { display: flex; gap: 4px; margin-left: 12px; }

    .tool-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--dim);
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: var(--radius);
      transition: all .15s;
    }
    .tool-btn:hover { border-color: var(--accent); color: var(--accent); }
    .tool-btn.active {
      background: rgba(0,229,255,0.08);
      border-color: var(--accent);
      color: var(--accent);
    }
    .tool-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }

    .sep { width: 1px; background: var(--border); height: 28px; margin: 0 6px; }

    .file-btn {
      padding: 5px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--dim);
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all .15s;
    }
    .file-btn:hover { border-color: var(--accent2); color: var(--accent2); }
    .file-btn:disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }
    .file-btn.save-btn:hover { border-color: #4ade80; color: #4ade80; }

    .stats {
      margin-left: auto;
      display: flex;
      gap: 20px;
      color: var(--dim);
      font-size: 11px;
    }
    .stats span { color: var(--text); }

    /* MAIN AREA */
    .workspace { display: flex; flex: 1; overflow: hidden; }

    /* CANVAS */
    .canvas-wrap { flex: 1; position: relative; overflow: hidden; background: var(--bg); }
    canvas { display: block; cursor: crosshair; }

    /* SIDE PANEL */
    .panel {
      width: 240px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .panel-section { border-bottom: 1px solid var(--border); padding: 12px 14px; }
    .panel-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 8px;
    }

    /* --- Path list --- */
    .path-list { max-height: 200px; overflow-y: auto; }
    .path-list::-webkit-scrollbar { width: 4px; }
    .path-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .path-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-bottom: 1px solid rgba(37,42,53,0.5);
      cursor: pointer;
      transition: background .1s;
      border-left: 3px solid transparent;
    }
    .path-item:hover { background: rgba(255,255,255,0.03); }
    .path-item.active {
      background: rgba(0,229,255,0.07);
      border-left-color: var(--accent);
    }
    .path-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--path-color, var(--accent));
      flex-shrink: 0;
    }
    .path-item.active .path-dot { background: var(--accent); }
    .path-name { flex: 1; font-size: 11px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .path-item.active .path-name { color: var(--accent); font-weight: 600; }
    .path-count { font-size: 10px; color: var(--dim); flex-shrink: 0; }
    .path-btn {
      background: none;
      border: none;
      color: var(--dim);
      cursor: pointer;
      padding: 2px 4px;
      font-size: 13px;
      line-height: 1;
      transition: color .1s;
      flex-shrink: 0;
    }
    .path-btn:hover { color: var(--accent); }
    .path-btn-del:hover { color: var(--accent2); }

    .path-actions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }
    .path-action-btn {
      flex: 1;
      padding: 5px 0;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--dim);
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
      border-radius: var(--radius);
      transition: all .15s;
    }
    .path-action-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* Coordinate inputs */
    .coord-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .coord-field label { display: block; font-size: 10px; color: var(--dim); margin-bottom: 3px; }
    .coord-field input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text-hi);
      font-family: var(--mono);
      font-size: 12px;
      padding: 5px 8px;
      border-radius: 4px;
      outline: none;
      transition: border-color .15s;
    }
    .coord-field input:focus { border-color: var(--accent); }

    .add-btn {
      margin-top: 10px;
      width: 100%;
      padding: 8px;
      background: rgba(0,229,255,0.1);
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: var(--radius);
      transition: background .15s;
    }
    .add-btn:hover { background: rgba(0,229,255,0.2); }

    /* Point list */
    .point-list { flex: 1; overflow-y: auto; padding: 0; }
    .point-list::-webkit-scrollbar { width: 4px; }
    .point-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .point-item {
      display: flex;
      align-items: center;
      padding: 7px 14px;
      border-bottom: 1px solid rgba(37,42,53,0.6);
      cursor: pointer;
      transition: background .1s;
      gap: 8px;
    }
    .point-item:hover { background: rgba(0,229,255,0.05); }
    .point-item.selected { background: rgba(0,229,255,0.1); }
    .pt-id { color: var(--accent); font-size: 10px; min-width: 22px; }
    .pt-coords { flex: 1; color: var(--text); font-size: 11px; }
    .pt-del {
      color: var(--border);
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      transition: color .1s;
      background: none;
      border: none;
      padding: 2px 4px;
    }
    .pt-del:hover { color: var(--accent2); }

    /* STATUS BAR */
    .statusbar {
      height: 26px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 24px;
      font-size: 11px;
      color: var(--dim);
      flex-shrink: 0;
    }
    .status-mode { color: var(--accent); font-weight: 600; }
    .status-cursor { color: var(--text); }

    /* TOAST */
    #toast {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-hi);
      font-family: var(--mono);
      font-size: 12px;
      padding: 8px 18px;
      border-radius: var(--radius);
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s, transform .2s;
      z-index: 100;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.err  { border-color: var(--accent2); color: var(--accent2); }

    #fileInput, #fileInputAdd { display: none; }
  </style>
</head>
<body>

<header>
  <div class="logo">PATH<span>.</span>EDITOR</div>

  <div class="toolbar">
    <button class="tool-btn active" id="toolAdd" title="Aggiungi punto (A)">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Aggiungi
    </button>
    <button class="tool-btn" id="toolSelect" title="Seleziona / muovi (S)">
      <svg viewBox="0 0 24 24"><path d="M5 3l14 9-7 1-4 7z"/></svg>
      Seleziona
    </button>
    <button class="tool-btn" id="toolSplit" title="Spezza segmento (X)">
      <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><circle cx="9" cy="12" r="2"/><circle cx="15" cy="12" r="2"/></svg>
      Spezza
    </button>
    <button class="tool-btn" id="toolZoom" title="Zoom a finestra (Z)">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="8" height="8" rx="1"/><line x1="11" y1="11" x2="21" y2="21"/></svg>
      Zoom
    </button>
    <button class="tool-btn" id="toolErase" title="Cancella multiplo (D)">
      <svg viewBox="0 0 24 24"><path d="M20 20H7L3 16l10-10 7 7-3.5 3.5"/><line x1="6" y1="14" x2="10" y2="18"/></svg>
      Cancella
    </button>
  </div>

  <div class="sep"></div>

  <button class="file-btn" id="btnUndo"  title="Annulla (Ctrl+Z)"  disabled>&#x21B6; Annulla</button>
  <button class="file-btn" id="btnRedo"  title="Ripristina (Ctrl+Y)" disabled>&#x21B7; Ripristina</button>

  <div class="sep"></div>

  <button class="file-btn" id="btnLoad">&#x2B06; Carica nel percorso</button>
  <button class="file-btn save-btn" id="btnSave">&#x2B07; Salva percorso</button>
  <button class="file-btn" id="btnClosed">Chiudi percorso</button>
  <button class="file-btn" id="btnZoomReset" title="Ripristina zoom (R)">&#x29BE; Zoom reset</button>
  <button class="file-btn" id="btnClear" style="color:#e53e3e;border-color:#e53e3e22">&#x2715; Svuota tutto</button>

  <div class="stats">
    Punti: <span id="statPts">0</span> &nbsp;|&nbsp; Segmenti: <span id="statSegs">0</span>
  </div>
</header>

<div class="workspace">
  <div class="canvas-wrap">
    <canvas id="canvas"></canvas>
  </div>

  <aside class="panel">

    <!-- Sezione percorsi -->
    <div class="panel-section">
      <div class="panel-label">Percorsi</div>
      <div class="path-list" id="pathList"></div>
      <div class="path-actions">
        <button class="path-action-btn" id="btnNewPath">+ Nuovo</button>
        <button class="path-action-btn" id="btnLoadPath">&#x2B06; Importa CSV</button>
      </div>
    </div>

    <!-- Sezione coordinate -->
    <div class="panel-section">
      <div class="panel-label">Coordinate</div>
      <div class="coord-grid">
        <div class="coord-field"><label>X</label><input type="number" id="inputX" placeholder="0" /></div>
        <div class="coord-field"><label>Y</label><input type="number" id="inputY" placeholder="0" /></div>
      </div>
      <button class="add-btn" id="btnAddPoint">+ Aggiungi Punto</button>
    </div>

    <!-- Lista punti del percorso attivo -->
    <div class="panel-section" style="padding-bottom:8px">
      <div class="panel-label">Punti (<span id="ptCount">0</span>)</div>
    </div>
    <div class="point-list" id="pointList"></div>

  </aside>
</div>

<div class="statusbar">
  <span>MODO: <span class="status-mode" id="modeLbl">AGGIUNGI</span></span>
  <span>Cursore: <span class="status-cursor" id="cursorPos">-</span></span>
  <span style="margin-left:auto;font-size:10px;color:var(--border)" id="hintText">
    Click canvas = aggiungi punto &nbsp;|&nbsp; Scroll = zoom &nbsp;|&nbsp; Alt+drag = pan
  </span>
</div>

<div id="toast"></div>
<input type="file" id="fileInput"    accept=".csv" />
<input type="file" id="fileInputAdd" accept=".csv" />

<script src="editor.js"></script>
</body>
</html>
